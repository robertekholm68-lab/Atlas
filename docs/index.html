<!DOCTYPE html>
<html lang="sv">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>ATLAS</title>
<meta name="theme-color" content="#090B10">
<meta name="description" content="ATLAS – AI Digital Human Twin för styrketräning, återhämtning och kost.">
<style>
  *{box-sizing:border-box}
  body{margin:0;min-height:100vh;background:#090B10;color:#E6EAF0;
       font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;
       display:flex;align-items:center;justify-content:center;padding:28px 20px}
  .bar{position:fixed;top:0;left:0;right:0;height:5px;
       background:linear-gradient(90deg,#4DA3FF 0 34%,#9B7CFF 34% 56%,#39D98A 56% 70%,transparent 70%)}
  .wrap{width:100%;max-width:420px}
  h1{font-size:42px;margin:0;letter-spacing:-1px;font-weight:800}
  .sub{color:#8A94A3;font-size:14px;margin:8px 0 2px;line-height:1.5}
  .tag{color:#4DA3FF;font-size:12.5px;font-style:italic;margin:14px 0 30px}
  a.btn{display:block;text-decoration:none;text-align:center;padding:15px;border-radius:13px;
        font-size:15px;font-weight:700;margin-bottom:10px;transition:.15s}
  a.primary{background:#4DA3FF;color:#08101c}
  a.primary:hover{background:#6FB6FF}
  a.ghost{border:1px solid #232A36;color:#E6EAF0}
  a.ghost:hover{border-color:#4DA3FF}
  .hint{color:#6B7480;font-size:12px;line-height:1.6;margin-top:18px;
        border-top:1px solid #1A2029;padding-top:16px}
  .hint b{color:#8A94A3;font-weight:600}
  .rec{display:inline-block;font-size:10px;letter-spacing:.7px;color:#39D98A;
       background:rgba(57,217,138,.12);padding:2px 8px;border-radius:5px;margin-left:7px;vertical-align:2px}
</style>
</head>
<body>
<div class="bar"></div>
<div class="wrap">
  <h1>ATLAS</h1>
  <div class="sub">AI Digital Human Twin · styrketräning, återhämtning och kost</div>
  <div class="tag">”kroppen är gränssnittet”</div>

  <div id="links"></div>

  <div class="hint" id="hint"></div>
</div>

<script>
  // Enkel enhetsgissning: mobil får mobilbygget först, dator får webbappen först.
  // Ingen automatisk omdirigering — på iPhone måste man landa på mobile.html INNAN
  // man lägger till på hemskärmen, annars sparas den här sidan i stället för appen.
  var ua = navigator.userAgent;
  var isIOS = /iPad|iPhone|iPod/.test(ua) || (/Macintosh/.test(ua) && 'ontouchend' in document);
  var isAndroid = /Android/.test(ua);
  var isPhone = isIOS || isAndroid || Math.min(screen.width, screen.height) < 820;

  var mobileBtn = '<a class="btn ' + (isPhone ? 'primary' : 'ghost') + '" href="./mobile.html">Öppna ATLAS mobil' + (isPhone ? '<span class="rec">REKOMMENDERAS</span>' : '') + '</a>';
  var webBtn = '<a class="btn ' + (isPhone ? 'ghost' : 'primary') + '" href="./app.html">Öppna ATLAS webb' + (isPhone ? '' : '<span class="rec">REKOMMENDERAS</span>') + '</a>';
  document.getElementById('links').innerHTML = isPhone ? mobileBtn + webBtn : webBtn + mobileBtn;

  var hint;
  if (isIOS) {
    hint = '<b>Lägg till på hemskärmen.</b> Öppna mobilversionen, tryck på Dela-ikonen i Safari och välj ”Lägg till på hemskärmen”. Det gör att din träningshistorik inte rensas bort av webbläsaren, och att notiser fungerar.';
  } else if (isAndroid) {
    hint = '<b>Installera appen.</b> Öppna mobilversionen, tryck på menyn (tre prickar) och välj ”Installera app”. Då får ATLAS egen ikon och behåller din data tryggare.';
  } else {
    hint = '<b>Ska du träna med appen?</b> Öppna den här adressen i telefonen i stället — mobilversionen är gjord för att användas under passet, med GPS, streckkodsläsare och vilotimer.';
  }
  hint += '<br><br><b>Din data stannar hos dig.</b> Allt sparas lokalt i din egen webbläsare. Inget konto, ingen server.';
  document.getElementById('hint').innerHTML = hint;
</script>

<script>
// Webbversionen är byggd för stora skärmar och är tyngre att tolka. På telefon
// pekar vi tydligt ut mobilversionen i stället — inte en tvingande omdirigering,
// men den blir det uppenbara valet.
(function () {
  try {
    var liten = window.matchMedia && window.matchMedia("(max-width: 820px)").matches;
    var pekskarm = window.matchMedia && window.matchMedia("(pointer: coarse)").matches;
    if (!(liten || pekskarm)) return;
    document.documentElement.setAttribute("data-telefon", "1");
    document.addEventListener("DOMContentLoaded", function () {
      var web = document.querySelector('a[href="./app.html"]');
      if (web) {
        web.setAttribute("data-sekundar", "1");
        var varning = document.createElement("div");
        varning.textContent = "Webbversionen är gjord för dator och kan bli tung på telefon.";
        varning.style.cssText = "font-size:12.5px;opacity:.6;line-height:1.5;margin-top:8px;text-align:center";
        web.parentNode.insertBefore(varning, web.nextSibling);
      }
      var mob = document.querySelector('a[href="./mobile.html"]');
      if (mob) mob.setAttribute("data-primar", "1");
    });
  } catch (e) {}
})();
</script>
</body>
</html>
